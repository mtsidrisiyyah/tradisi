<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tradisi-Transformasi Digital Administrasi MTs Idrisiyyah</title>
    <meta name="description" content="Sistem Informasi Manajemen Administrasi Guru Terpadu">
    <meta name="theme-color" content="#166534">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Font: Inter + Segoe UI fallback -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>

    <!-- External Stylesheet -->
    <link rel="stylesheet" href="style.css">

    <!-- Tailwind Configuration - Natural Forest Palette -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Segoe UI', 'Inter', 'system-ui', 'sans-serif'],
                        display: ['Outfit', 'Inter', 'sans-serif'],
                    },
                    colors: {
                        forest: {
                            50: '#f0fdf4',
                            100: '#dcfce7',
                            200: '#bbf7d0',
                            300: '#86efac',
                            400: '#4ade80',
                            500: '#22c55e',
                            600: '#16a34a',
                            700: '#166534',
                            800: '#14532d',
                            900: '#052e16',
                            950: '#022c22',
                        },
                        sand: {
                            50: '#fffbeb',
                            100: '#fef3c7',
                            200: '#fde68a',
                            300: '#fcd34d',
                            400: '#fbbf24',
                            500: '#f59e0b',
                            600: '#d97706',
                            700: '#b45309',
                            800: '#92400e',
                            900: '#78350f',
                        },
                        slate: {
                            850: '#172033',
                        }
                    }
                }
            }
        }
    </script>

    <!-- Theme Init -->
    <script>
        const savedTheme = localStorage.getItem('tradisi_theme');
        if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>

<body class="text-stone-800 dark:text-stone-200 antialiased h-screen overflow-hidden flex flex-col bg-stone-50 dark:bg-stone-900 transition-colors duration-200">

    <!-- ============ LOGIN PAGE - Neumorphic Design ============ -->
    <div id="login-view" class="flex-1 absolute inset-0 z-50 login-neu-page">
        <div class="login-neu-container">
            <div class="login-neu-wrapper" id="auth-container">
                <!-- Header -->
                <div class="login-neu-header">
                    <div class="login-neu-logo">
                        <img src="https://i.postimg.cc/YChZPb1f/LOGO-MTS.png" alt="Logo" class="login-neu-logo-img">
                    </div>
                    <h1 class="login-neu-title">TRADISI</h1>
                    <p class="login-neu-subtitle">Transformasi Digital Administrasi Idrisiyyah</p>
                </div>

                <!-- Login Form -->
                <div class="login-neu-card">
                    <form id="login-form" class="login-neu-form">
                        <div class="login-neu-group">
                            <label class="login-neu-label" for="email">Email</label>
                            <div class="login-neu-input-wrap">
                                <i class="ph ph-envelope-simple login-neu-input-icon"></i>
                                <input type="email" id="email" class="login-neu-input" placeholder="guru@idrisiyyah.sch.id" required>
                            </div>
                        </div>
                        <div class="login-neu-group">
                            <label class="login-neu-label" for="password">Kata Sandi</label>
                            <div class="login-neu-input-wrap">
                                <i class="ph ph-lock-key login-neu-input-icon"></i>
                                <input type="password" id="password" class="login-neu-input" placeholder="Masukkan kata sandi" required>
                                <button type="button" class="login-neu-pw-toggle" onclick="let p=this.previousElementSibling;p.type=p.type==='password'?'text':'password';this.querySelector('i').className=p.type==='password'?'ph ph-eye':'ph ph-eye-slash'">
                                    <i class="ph ph-eye"></i>
                                </button>
                            </div>
                        </div>

                        <div id="login-error" class="login-neu-error hidden"></div>

                        <div class="login-neu-btn-wrap">
                            <button type="submit" id="login-btn" class="login-neu-btn">
                                <span>Masuk</span>
                            </button>
                        </div>
                    </form>
                </div>

                <!-- Footer -->
                <div class="login-neu-footer">
                    Belum punya akun? <button type="button" onclick="window.showRegisterForm()" class="login-neu-link">Daftar Akun Baru</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ============ APP VIEW ============ -->
    <div id="app-view" class="hidden h-full flex w-full">

        <!-- Sidebar -->
        <aside id="sidebar"
            class="bg-forest-900 dark:bg-forest-950 text-white w-72 flex-shrink-0 h-full flex flex-col transition-all duration-300 transform -translate-x-full md:translate-x-0 absolute md:relative z-40 border-r border-forest-800 dark:border-forest-950 shadow-xl overflow-hidden">
            <div class="p-5 flex items-center justify-between border-b border-forest-800 dark:border-forest-950 bg-forest-950/50 sidebar-header">
                <div class="flex items-center gap-3">
                    <div class="p-1.5 bg-white/10 rounded-xl flex-shrink-0">
                        <img src="https://i.postimg.cc/YChZPb1f/LOGO-MTS.png" alt="Logo" class="w-8 h-8 object-contain">
                    </div>
                    <div class="sidebar-brand-text overflow-hidden">
                        <h2 class="text-lg font-bold tracking-tight text-white whitespace-nowrap">TRADISI</h2>
                        <p class="text-[9px] text-forest-400 uppercase tracking-widest -mt-0.5 font-medium whitespace-nowrap">Administrasi Guru</p>
                    </div>
                </div>
                <button id="close-sidebar" class="md:hidden text-forest-400 hover:text-white p-1 rounded hover:bg-forest-800">
                    <i class="ph ph-x text-xl"></i>
                </button>
            </div>

            <div class="flex-1 overflow-y-auto custom-scrollbar p-4 space-y-4" id="sidebar-menu-container">
                <!-- Menu rendered via JavaScript -->
            </div>

            <div class="p-4 border-t border-forest-800 dark:border-forest-950 bg-forest-950/30 sidebar-footer">
                <div class="flex items-center gap-3 mb-4">
                    <div class="w-10 h-10 rounded-xl bg-forest-700 flex items-center justify-center text-lg font-bold text-white shadow-md flex-shrink-0"
                        id="user-initial">G</div>
                    <div class="overflow-hidden sidebar-brand-text">
                        <p class="text-sm font-medium truncate" id="sidebar-user-name">Memuat...</p>
                        <p class="text-[10px] text-sand-400 font-semibold uppercase tracking-wider whitespace-nowrap"
                            id="sidebar-user-role">Guru / Pendidik</p>
                    </div>
                </div>
                <button id="logout-btn"
                    class="w-full flex items-center justify-center gap-2 bg-red-500/10 hover:bg-red-600 text-red-400 hover:text-white border border-red-500/20 py-2.5 rounded-xl transition-all text-xs font-semibold">
                    <i class="ph ph-sign-out"></i> <span class="sidebar-brand-text">Keluar</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col h-full bg-stone-50 dark:bg-stone-900 min-w-0">

            <!-- Topbar -->
            <header id="topbar"
                class="bg-white dark:bg-stone-900 shadow-sm border-b border-stone-200 dark:border-stone-800 px-4 md:px-8 py-3.5 flex items-center justify-between flex-shrink-0 z-30 transition-colors duration-200">
                <div class="flex items-center gap-3">
                    <button id="open-sidebar"
                        class="md:hidden text-stone-600 dark:text-stone-300 hover:bg-stone-100 dark:hover:bg-stone-800 p-1.5 rounded-lg">
                        <i class="ph ph-list text-2xl"></i>
                    </button>
                    <!-- Sidebar collapse toggle (desktop only) -->
                    <button id="sidebar-collapse-btn"
                        class="hidden md:flex text-stone-500 dark:text-stone-400 hover:text-forest-600 dark:hover:text-forest-400 hover:bg-stone-100 dark:hover:bg-stone-800 p-2 rounded-xl transition-colors"
                        title="Toggle Sidebar">
                        <i id="sidebar-collapse-icon" class="ph ph-sidebar text-lg"></i>
                    </button>
                    <div>
                        <h2 class="text-lg font-bold text-stone-800 dark:text-stone-100 flex items-center gap-2"
                            id="header-title">Dashboard</h2>
                        <!-- Breadcrumb -->
                        <nav id="breadcrumb" class="hidden md:flex items-center gap-1.5 text-[10px] text-stone-400 mt-0.5">
                            <span class="breadcrumb-home cursor-pointer hover:text-forest-600 transition-colors">Home</span>
                        </nav>
                    </div>
                </div>
                <div class="flex items-center gap-2.5">
                    <!-- Global Search Trigger -->
                    <button id="search-trigger"
                        class="hidden md:flex items-center gap-2 px-3 py-2 rounded-xl bg-stone-100 dark:bg-stone-800 text-stone-400 hover:text-stone-600 dark:hover:text-stone-300 transition-colors text-xs"
                        title="Pencarian (Ctrl+K)">
                        <i class="ph ph-magnifying-glass text-base"></i>
                        <span class="hidden lg:inline">Cari...</span>
                        <kbd class="hidden lg:inline text-[9px] font-bold bg-stone-200 dark:bg-stone-700 text-stone-500 dark:text-stone-400 px-1.5 py-0.5 rounded">Ctrl+K</kbd>
                    </button>

                    <button onclick="toggleDarkMode()"
                        class="p-2 rounded-xl bg-stone-100 dark:bg-stone-800 text-stone-600 dark:text-stone-300 hover:text-forest-600 transition-colors"
                        title="Toggle Tema">
                        <i id="theme-toggle-icon" class="ph ph-moon text-lg"></i>
                    </button>

                    <!-- Live Date/Time -->
                    <div class="hidden md:flex items-center gap-2 bg-stone-100 dark:bg-stone-800 px-3.5 py-2 rounded-xl">
                        <i class="ph ph-clock text-forest-600 dark:text-forest-400 text-base"></i>
                        <div class="text-right">
                            <p class="text-[11px] font-bold text-stone-800 dark:text-stone-200 leading-tight" id="topbar-clock">--:--:--</p>
                            <p class="text-[9px] text-stone-400 font-medium leading-tight" id="topbar-date">Memuat...</p>
                        </div>
                    </div>

                    <div class="hidden md:block text-right pl-3 border-l border-stone-200 dark:border-stone-800">
                        <p class="text-xs font-bold text-stone-800 dark:text-stone-200 leading-tight"
                            id="topbar-user-name">Memuat...</p>
                        <p class="text-[9px] text-stone-400 font-medium">Sistem Terkoneksi</p>
                    </div>
                </div>
            </header>

            <!-- Dynamic Content Area -->
            <div id="content-area" class="flex-1 overflow-y-auto p-4 md:p-8 custom-scrollbar">
                <!-- Dynamic content loaded here -->
            </div>
        </main>

        <!-- Mobile Overlay -->
        <div id="mobile-overlay" class="fixed inset-0 bg-black bg-opacity-50 z-30 hidden md:hidden"></div>

        <!-- Mobile Bottom Navigation -->
        <nav id="mobile-bottom-nav" class="fixed bottom-0 left-0 right-0 z-40 bg-white dark:bg-stone-900 border-t border-stone-200 dark:border-stone-800 flex md:hidden safe-bottom">
            <button onclick="window.loadPage('Dashboard')" class="flex-1 flex flex-col items-center py-2.5 gap-0.5 text-stone-400 hover:text-forest-600 transition-colors" data-page="Dashboard">
                <i class="ph ph-squares-four text-xl"></i>
                <span class="text-[9px] font-bold">Home</span>
            </button>
            <button onclick="window.loadPage('Data Siswa')" class="flex-1 flex flex-col items-center py-2.5 gap-0.5 text-stone-400 hover:text-forest-600 transition-colors" data-page="Data Siswa">
                <i class="ph ph-student text-xl"></i>
                <span class="text-[9px] font-bold">Siswa</span>
            </button>
            <button onclick="window.loadPage('Absensi Siswa')" class="flex-1 flex flex-col items-center py-2.5 gap-0.5 text-stone-400 hover:text-forest-600 transition-colors" data-page="Absensi Siswa">
                <i class="ph ph-check-square text-xl"></i>
                <span class="text-[9px] font-bold">Absensi</span>
            </button>
            <button onclick="window.loadPage('Jurnal Agenda Guru')" class="flex-1 flex flex-col items-center py-2.5 gap-0.5 text-stone-400 hover:text-forest-600 transition-colors" data-page="Jurnal Agenda Guru">
                <i class="ph ph-notebook text-xl"></i>
                <span class="text-[9px] font-bold">Jurnal</span>
            </button>
            <button onclick="window.toggleSidebar(true)" class="flex-1 flex flex-col items-center py-2.5 gap-0.5 text-stone-400 hover:text-forest-600 transition-colors">
                <i class="ph ph-list text-xl"></i>
                <span class="text-[9px] font-bold">Menu</span>
            </button>
        </nav>
    </div>

    <!-- ============ GLOBAL CRUD MODAL ============ -->
    <div id="crud-modal"
        class="fixed inset-0 z-50 flex items-center justify-center bg-stone-950/60 backdrop-blur-sm hidden p-4">
        <div class="bg-white dark:bg-stone-800 rounded-2xl shadow-xl max-w-lg w-full border border-stone-200 dark:border-stone-700 overflow-hidden transform scale-95 opacity-0 transition-all duration-300"
            id="crud-modal-box">
            <div class="px-6 py-4 bg-stone-50 dark:bg-stone-850 border-b border-stone-200 dark:border-stone-700 flex justify-between items-center">
                <h3 class="text-base font-bold text-stone-800 dark:text-stone-100" id="crud-modal-title">Form</h3>
                <button onclick="closeModal()"
                    class="text-stone-500 hover:text-stone-700 dark:text-stone-400 dark:hover:text-stone-200 p-1.5 rounded-lg"><i
                        class="ph ph-x text-lg"></i></button>
            </div>
            <form id="crud-modal-form" class="p-6 space-y-4">
                <div id="crud-modal-body"></div>
                <div class="flex justify-end gap-3 pt-4 border-t border-stone-100 dark:border-stone-700">
                    <button type="button" onclick="closeModal()"
                        class="px-4 py-2 bg-stone-100 dark:bg-stone-700 text-stone-700 dark:text-stone-200 text-xs font-semibold rounded-xl hover:bg-stone-200 transition-colors">Batal</button>
                    <button type="submit"
                        class="px-4 py-2 bg-forest-700 hover:bg-forest-800 text-white text-xs font-semibold rounded-xl shadow-md transition-colors"
                        id="crud-modal-save-btn">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ============ TOAST NOTIFICATION ============ -->
    <div id="toast"
        class="fixed bottom-5 right-5 z-50 transform translate-y-20 opacity-0 transition-all duration-300 flex items-center gap-3 bg-stone-900 text-white dark:bg-white dark:text-stone-900 py-3 px-5 rounded-2xl shadow-2xl max-w-sm border border-stone-800 dark:border-stone-200">
        <i id="toast-icon" class="ph ph-check-circle text-xl text-forest-500"></i>
        <div class="text-xs font-semibold" id="toast-text">Berhasil!</div>
    </div>

    <!-- ============ GLOBAL SEARCH MODAL (Command Palette) ============ -->
    <div id="search-modal" class="fixed inset-0 z-[60] hidden">
        <div class="absolute inset-0 bg-stone-950/50 backdrop-blur-sm" id="search-overlay"></div>
        <div class="relative mx-auto mt-[15vh] max-w-xl w-full px-4">
            <div class="bg-white dark:bg-stone-800 rounded-2xl shadow-2xl border border-stone-200 dark:border-stone-700 overflow-hidden">
                <!-- Search Input -->
                <div class="flex items-center gap-3 px-5 py-4 border-b border-stone-100 dark:border-stone-700">
                    <i class="ph ph-magnifying-glass text-xl text-stone-400"></i>
                    <input type="text" id="search-input"
                        class="flex-1 bg-transparent outline-none text-sm text-stone-800 dark:text-stone-200 placeholder:text-stone-400"
                        placeholder="Cari halaman, data siswa, guru..." autocomplete="off">
                    <kbd class="text-[9px] font-bold bg-stone-100 dark:bg-stone-700 text-stone-400 px-2 py-1 rounded">ESC</kbd>
                </div>
                <!-- Search Results -->
                <div id="search-results" class="max-h-80 overflow-y-auto custom-scrollbar p-2">
                    <div class="text-center py-8 text-xs text-stone-400">
                        <i class="ph ph-magnifying-glass text-2xl mb-2 block"></i>
                        Ketik untuk mencari halaman atau data...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Application Logic -->
    <script type="module" src="js/app.js"></script>

    <!-- Live Clock -->
    <script>
        function updateClock() {
            const now = new Date();
            const jam = String(now.getHours()).padStart(2, '0');
            const menit = String(now.getMinutes()).padStart(2, '0');
            const detik = String(now.getSeconds()).padStart(2, '0');
            const timeStr = `${jam}:${menit}:${detik}`;
            const bulan = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
            const hari = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
            const dateStr = `${hari[now.getDay()]}, ${now.getDate()} ${bulan[now.getMonth()]} ${now.getFullYear()}`;

            // Topbar
            const clockEl = document.getElementById('topbar-clock');
            if (clockEl) clockEl.textContent = timeStr;
            const dateEl = document.getElementById('topbar-date');
            if (dateEl) dateEl.textContent = dateStr;

            // Dashboard
            const dashClock = document.getElementById('dashboard-clock');
            if (dashClock) dashClock.textContent = timeStr;

            // Login page
            const loginClock = document.getElementById('login-clock');
            if (loginClock) loginClock.textContent = timeStr;
            const loginDate = document.getElementById('login-date');
            if (loginDate) loginDate.textContent = `· ${dateStr}`;
        }
        updateClock();
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
