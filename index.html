<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRADISI - Transformasi Digital Administrasi MTs Idrisiyyah</title>
    <meta name="description" content="Sistem Informasi Manajemen Administrasi Guru Terpadu">
    <meta name="theme-color" content="#f97316">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Lucide Icons (Modern Icon Set) -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

    <!-- Phosphor Icons (fallback for existing references) -->
    <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>

    <!-- External Stylesheet -->
    <link rel="stylesheet" href="style.css">

    <!-- Tailwind Configuration - Morning Spirit Palette -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', '"SF Pro Display"', '"SF Pro Text"', '"Helvetica Neue"', 'Helvetica', 'Arial', 'sans-serif'],
                    },
                    colors: {
                        // Morning Spirit Warm Palette
                        morning: {
                            50: '#fff7ed',
                            100: '#ffedd5',
                            200: '#fed7aa',
                            300: '#fdba74',
                            400: '#fb923c',
                            500: '#f97316',
                            600: '#ea580c',
                            700: '#c2410c',
                            800: '#9a3412',
                            900: '#7c2d12',
                        },
                        slate: {
                            850: '#1e293b',
                        }
                    }
                }
            }
        }
    </script>

    <!-- Theme Init (prevent flash) -->
    <script>
        const savedTheme = localStorage.getItem('tradisi_theme');
        if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>

<body class="text-stone-800 dark:text-stone-200 antialiased h-screen overflow-hidden flex flex-col bg-stone-50 dark:bg-stone-900 transition-colors duration-200">

    <!-- VIEW 1: HALAMAN LOGIN -->
    <div id="login-view" class="flex-1 flex items-center justify-center login-bg absolute inset-0 z-50 overflow-hidden">
        <!-- Animated glows - Sunrise palette -->
        <div class="login-glow-orange"></div>
        <div class="login-glow-amber"></div>
        <div class="login-glow-rose"></div>

        <!-- Login Card -->
        <div class="bg-white/10 backdrop-blur-2xl border border-white/20 p-8 rounded-3xl shadow-2xl w-full max-w-md mx-4 relative z-10">
            <div class="text-center mb-8">
                <div class="inline-flex p-2 bg-gradient-to-br from-orange-500 via-amber-500 to-rose-500 rounded-2xl shadow-lg shadow-orange-500/20 mb-4">
                    <img src="https://i.postimg.cc/YChZPb1f/LOGO-MTS.png" alt="Logo MTs Idrisiyyah" class="w-16 h-16 object-contain">
                </div>
                <h1 class="text-3xl font-extrabold text-white tracking-tight bg-gradient-to-r from-orange-400 via-amber-400 to-rose-400 bg-clip-text text-transparent">
                    TRADISI</h1>
                <p class="text-xs text-stone-400 mt-1.5 uppercase tracking-widest font-medium">Transformasi Digital Administrasi Idrisiyyah</p>
            </div>

            <form id="login-form" class="space-y-5">
                <div>
                    <label class="block text-xs font-semibold text-stone-300 mb-2 uppercase tracking-wide">Alamat Email</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-stone-400">
                            <i class="ph ph-envelope-simple text-lg"></i>
                        </span>
                        <input type="email" id="email" required
                            class="w-full pl-11 pr-4 py-3 bg-white/5 border border-white/10 rounded-xl focus:ring-2 focus:ring-orange-500/50 focus:border-orange-500 outline-none text-white transition-all text-sm placeholder:text-stone-500"
                            placeholder="guru@idrisiyyah.sch.id">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-stone-300 mb-2 uppercase tracking-wide">Kata Sandi</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-stone-400">
                            <i class="ph ph-lock-key text-lg"></i>
                        </span>
                        <input type="password" id="password" required
                            class="w-full pl-11 pr-4 py-3 bg-white/5 border border-white/10 rounded-xl focus:ring-2 focus:ring-orange-500/50 focus:border-orange-500 outline-none text-white transition-all text-sm placeholder:text-stone-500"
                            placeholder="Masukkan kata sandi">
                    </div>
                </div>
                <div id="login-error" class="text-red-400 text-xs hidden bg-red-950/40 border border-red-500/30 p-3 rounded-xl"></div>
                <button type="submit" id="login-btn"
                    class="w-full mt-2 bg-gradient-to-r from-orange-500 via-amber-500 to-orange-600 hover:from-orange-600 hover:via-amber-600 hover:to-orange-700 text-white font-bold py-3 px-4 rounded-xl transition-all shadow-lg shadow-orange-500/25 active:scale-[0.98] flex justify-center items-center text-sm">
                    <span>Masuk</span>
                </button>
            </form>

            <div class="mt-8 text-center text-xs text-stone-500">
                Hubungi administrator untuk pendaftaran akun.
            </div>
        </div>
    </div>

    <!-- VIEW 2: APLIKASI UTAMA -->
    <div id="app-view" class="hidden h-full flex w-full">

        <!-- Sidebar -->
        <aside id="sidebar"
            class="bg-stone-900 dark:bg-stone-950 text-white w-72 flex-shrink-0 h-full flex flex-col transition-transform transform -translate-x-full md:translate-x-0 absolute md:relative z-40 border-r border-stone-800 dark:border-stone-900 shadow-xl">
            <div class="p-5 flex items-center justify-between border-b border-stone-800 dark:border-stone-900 bg-stone-950/50">
                <div class="flex items-center gap-3">
                    <div class="p-1.5 bg-gradient-to-br from-orange-500 to-amber-500 rounded-xl shadow-md shadow-orange-500/20">
                        <img src="https://i.postimg.cc/YChZPb1f/LOGO-MTS.png" alt="Logo" class="w-8 h-8 object-contain">
                    </div>
                    <div>
                        <h2 class="text-lg font-extrabold tracking-tight bg-gradient-to-r from-orange-400 to-amber-400 bg-clip-text text-transparent">
                            TRADISI</h2>
                        <p class="text-[9px] text-stone-500 uppercase tracking-widest -mt-0.5 font-medium">Administrasi Guru</p>
                    </div>
                </div>
                <button id="close-sidebar" class="md:hidden text-stone-400 hover:text-white p-1 rounded hover:bg-stone-800">
                    <i class="ph ph-x text-xl"></i>
                </button>
            </div>

            <div class="flex-1 overflow-y-auto custom-scrollbar p-4 space-y-4" id="sidebar-menu-container">
                <!-- Menu rendered via JavaScript -->
            </div>

            <div class="p-4 border-t border-stone-800 dark:border-stone-900 bg-stone-950/20">
                <div class="flex items-center gap-3 mb-4">
                    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-orange-500 to-amber-500 flex items-center justify-center text-lg font-bold text-white shadow-md shadow-orange-500/20"
                        id="user-initial">G</div>
                    <div class="overflow-hidden">
                        <p class="text-sm font-medium truncate" id="sidebar-user-name">Memuat...</p>
                        <p class="text-[10px] text-orange-400 font-semibold uppercase tracking-wider"
                            id="sidebar-user-role">Guru / Pendidik</p>
                    </div>
                </div>
                <button id="logout-btn"
                    class="w-full flex items-center justify-center gap-2 bg-rose-600/10 hover:bg-rose-600 text-rose-400 hover:text-white border border-rose-500/20 py-2.5 rounded-xl transition-all text-xs font-semibold">
                    <i class="ph ph-sign-out"></i> Keluar
                </button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="flex-1 flex flex-col h-full bg-stone-50 dark:bg-stone-900 min-w-0">

            <!-- Topbar -->
            <header id="topbar"
                class="bg-white dark:bg-stone-900 shadow-sm border-b border-stone-200 dark:border-stone-800 px-4 md:px-8 py-3.5 flex items-center justify-between flex-shrink-0 z-30 transition-colors duration-200">
                <div class="flex items-center gap-4">
                    <button id="open-sidebar"
                        class="md:hidden text-stone-600 dark:text-stone-300 hover:bg-stone-100 dark:hover:bg-stone-800 p-1.5 rounded-lg">
                        <i class="ph ph-list text-2xl"></i>
                    </button>
                    <div>
                        <h2 class="text-lg font-bold text-stone-800 dark:text-stone-100 flex items-center gap-2"
                            id="header-title">Dashboard</h2>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <button onclick="toggleDarkMode()"
                        class="p-2 rounded-xl bg-stone-100 dark:bg-stone-800 text-stone-600 dark:text-stone-300 hover:text-orange-500 transition-colors"
                        title="Toggle Tema">
                        <i id="theme-toggle-icon" class="ph ph-moon text-lg"></i>
                    </button>

                    <!-- Live Date/Time Display -->
                    <div class="hidden md:flex items-center gap-2 bg-stone-100 dark:bg-stone-800 px-3.5 py-2 rounded-xl">
                        <i class="ph ph-clock text-orange-500 text-base"></i>
                        <div class="text-right">
                            <p class="text-[11px] font-bold text-stone-800 dark:text-stone-200 leading-tight" id="topbar-clock">--:--:--</p>
                            <p class="text-[9px] text-stone-400 font-medium leading-tight" id="topbar-date">Memuat...</p>
                        </div>
                    </div>

                    <div class="hidden md:block text-right pl-3 border-l border-stone-200 dark:border-stone-800">
                        <p class="text-xs font-bold text-stone-800 dark:text-stone-200 leading-tight"
                            id="topbar-user-name">Memuat...</p>
                        <p class="text-[9px] text-stone-400 font-medium">Sistem Terkoneksi</p>
                    </div>
                </div>
            </header>

            <!-- Dynamic Content Area -->
            <div id="content-area" class="flex-1 overflow-y-auto p-4 md:p-8 custom-scrollbar">
                <!-- Dynamic content loaded here -->
            </div>
        </main>

        <!-- Mobile Overlay -->
        <div id="mobile-overlay" class="fixed inset-0 bg-black bg-opacity-50 z-30 hidden md:hidden"></div>
    </div>

    <!-- GLOBAL CRUD MODAL -->
    <div id="crud-modal"
        class="fixed inset-0 z-50 flex items-center justify-center bg-stone-950/60 backdrop-blur-sm hidden p-4">
        <div class="bg-white dark:bg-stone-800 rounded-2xl shadow-xl max-w-lg w-full border border-stone-200 dark:border-stone-700 overflow-hidden transform scale-95 opacity-0 transition-all duration-300"
            id="crud-modal-box">
            <div class="px-6 py-4 bg-stone-50 dark:bg-stone-850 border-b border-stone-200 dark:border-stone-700 flex justify-between items-center">
                <h3 class="text-base font-bold text-stone-800 dark:text-stone-100" id="crud-modal-title">Form</h3>
                <button onclick="closeModal()"
                    class="text-stone-500 hover:text-stone-700 dark:text-stone-400 dark:hover:text-stone-200 p-1.5 rounded-lg"><i
                        class="ph ph-x text-lg"></i></button>
            </div>
            <form id="crud-modal-form" class="p-6 space-y-4">
                <div id="crud-modal-body"></div>
                <div class="flex justify-end gap-3 pt-4 border-t border-stone-100 dark:border-stone-700">
                    <button type="button" onclick="closeModal()"
                        class="px-4 py-2 bg-stone-100 dark:bg-stone-700 text-stone-700 dark:text-stone-200 text-xs font-semibold rounded-xl hover:bg-stone-200 transition-colors">Batal</button>
                    <button type="submit"
                        class="px-4 py-2 bg-orange-600 hover:bg-orange-700 text-white text-xs font-semibold rounded-xl shadow-md transition-colors"
                        id="crud-modal-save-btn">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <!-- TOAST NOTIFICATION -->
    <div id="toast"
        class="fixed bottom-5 right-5 z-50 transform translate-y-20 opacity-0 transition-all duration-300 flex items-center gap-3 bg-stone-900 text-white dark:bg-white dark:text-stone-900 py-3 px-5 rounded-2xl shadow-2xl max-w-sm border border-stone-800 dark:border-stone-200">
        <i id="toast-icon" class="ph ph-check-circle text-xl text-orange-500"></i>
        <div class="text-xs font-semibold" id="toast-text">Berhasil!</div>
    </div>

    <!-- Application Logic (External JS) -->
    <script type="module" src="app.js"></script>

    <!-- Live Clock -->
    <script>
        function updateClock() {
            const now = new Date();
            const jam = String(now.getHours()).padStart(2, '0');
            const menit = String(now.getMinutes()).padStart(2, '0');
            const detik = String(now.getSeconds()).padStart(2, '0');
            const timeStr = `${jam}:${menit}:${detik}`;
            const bulan = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
            const hari = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];

            // Topbar clock
            const clockEl = document.getElementById('topbar-clock');
            if (clockEl) clockEl.textContent = timeStr;

            const dateEl = document.getElementById('topbar-date');
            if (dateEl) dateEl.textContent = `${hari[now.getDay()]}, ${now.getDate()} ${bulan[now.getMonth()]} ${now.getFullYear()}`;

            // Dashboard clock
            const dashClock = document.getElementById('dashboard-clock');
            if (dashClock) dashClock.textContent = timeStr;
        }
        updateClock();
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
