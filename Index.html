<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRADISI - Transformasi Digital Administrasi Idrisiyyah</title>
    
    <!-- Meta tags untuk SEO & GitHub Pages sharing -->
    <meta name="description" content="Sistem Informasi Manajemen Administrasi Guru Terpadu">
    <meta name="theme-color" content="#2563eb">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons untuk Ikon Menu -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        /* Memastikan font default adalah Calibri, dengan fallback font sans-serif */
        @font-face {
            font-family: 'Calibri';
            src: local('Calibri'), local('Carlito'), sans-serif;
        }
        
        body {
            font-family: 'Calibri', sans-serif;
            background-color: #f3f4f6;
        }

        /* Memastikan output print menggunakan Calibri dan menyembunyikan elemen UI (sidebar/navbar) */
        @media print {
            body {
                font-family: 'Calibri', sans-serif !important;
                background-color: #ffffff;
            }
            #sidebar, #topbar, .no-print {
                display: none !important;
            }
            #main-content {
                margin: 0 !important;
                padding: 0 !important;
                width: 100% !important;
            }
        }

        /* Transisi halus untuk SPA */
        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Custom scrollbar untuk sidebar agar rapi di Windows/Mac */
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #4b5563;
            border-radius: 4px;
        }
        .custom-scrollbar:hover::-webkit-scrollbar-thumb {
            background: #6b7280;
        }
    </style>
</head>
<body class="text-gray-800 antialiased h-screen overflow-hidden flex flex-col">

    <!-- VIEW 1: HALAMAN LOGIN -->
    <div id="login-view" class="flex-1 flex items-center justify-center bg-gray-100 absolute inset-0 z-50">
        <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md mx-4">
            <div class="text-center mb-8">
                <i class="ph ph-student text-5xl text-blue-600 mb-2"></i>
                <h1 class="text-3xl font-bold text-gray-900 tracking-tight">TRADISI</h1>
                <p class="text-sm text-gray-500 mt-1">Transformasi Digital Administrasi Idrisiyyah</p>
            </div>
            
            <form id="login-form" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                    <input type="email" id="email" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" placeholder="guru@idrisiyyah.sch.id">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" id="password" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" placeholder="••••••••">
                </div>
                <div id="login-error" class="text-red-500 text-sm hidden bg-red-50 p-2 rounded"></div>
                <button type="submit" id="login-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 px-4 rounded-lg transition-colors flex justify-center items-center">
                    <span>Masuk</span>
                </button>
            </form>
            <div class="mt-6 text-center text-sm text-gray-500">
                Hubungi administrator untuk pendaftaran akun.
            </div>
        </div>
    </div>

    <!-- VIEW 2: APLIKASI UTAMA (Dashboard & Menu) -->
    <div id="app-view" class="hidden h-full flex w-full">
        
        <!-- Sidebar -->
        <aside id="sidebar" class="bg-gray-900 text-white w-72 flex-shrink-0 h-full flex flex-col transition-transform transform -translate-x-full md:translate-x-0 absolute md:relative z-40">
            <div class="p-5 flex items-center justify-between border-b border-gray-800">
                <div class="flex items-center gap-3" title="Transformasi Digital Administrasi Idrisiyyah">
                    <i class="ph ph-books text-2xl text-blue-400"></i>
                    <h2 class="text-2xl font-bold truncate tracking-tight">TRADISI</h2>
                </div>
                <button id="close-sidebar" class="md:hidden text-gray-400 hover:text-white">
                    <i class="ph ph-x text-xl"></i>
                </button>
            </div>
            
            <div class="flex-1 overflow-y-auto custom-scrollbar p-4 space-y-6" id="sidebar-menu-container">
                <!-- Menu akan di-render di sini via JavaScript -->
            </div>
            
            <div class="p-4 border-t border-gray-800">
                <div class="flex items-center gap-3 mb-4">
                    <div class="w-10 h-10 rounded-full bg-blue-500 flex items-center justify-center text-lg font-bold" id="user-initial">G</div>
                    <div class="overflow-hidden">
                        <p class="text-sm font-medium truncate" id="sidebar-user-name">Memuat...</p>
                        <p class="text-xs text-gray-400 truncate">Guru / Pendidik</p>
                    </div>
                </div>
                <button id="logout-btn" class="w-full flex items-center justify-center gap-2 bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg transition-colors text-sm">
                    <i class="ph ph-sign-out"></i> Keluar
                </button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="flex-1 flex flex-col h-full bg-gray-50 min-w-0">
            
            <!-- Topbar -->
            <header id="topbar" class="bg-white shadow-sm border-b border-gray-200 px-4 md:px-8 py-4 flex items-center justify-between flex-shrink-0 z-30">
                <div class="flex items-center gap-4">
                    <button id="open-sidebar" class="md:hidden text-gray-600 hover:text-gray-900">
                        <i class="ph ph-list text-2xl"></i>
                    </button>
                    <h2 class="text-xl font-semibold text-gray-800" id="header-title">Dashboard</h2>
                </div>
                <div class="flex items-center gap-4">
                    <button onclick="window.print()" class="no-print hidden md:flex items-center gap-2 text-gray-600 hover:text-blue-600 transition-colors bg-gray-100 hover:bg-blue-50 px-3 py-1.5 rounded-md text-sm font-medium">
                        <i class="ph ph-printer"></i> Cetak Dokumen
                    </button>
                    <div class="hidden md:block text-right">
                        <p class="text-sm font-bold text-gray-900 leading-tight" id="topbar-user-name">Memuat...</p>
                        <p class="text-xs text-gray-500">Sistem Terkoneksi</p>
                    </div>
                </div>
            </header>

            <!-- Dynamic Content Area -->
            <div id="content-area" class="flex-1 overflow-y-auto p-4 md:p-8">
                <!-- Konten dinamis akan masuk ke sini -->
            </div>
        </main>

        <!-- Overlay Mobile -->
        <div id="mobile-overlay" class="fixed inset-0 bg-black bg-opacity-50 z-30 hidden md:hidden"></div>
    </div>

    <!-- Firebase & Application Logic -->
    <script type="module">
        // 1. IMPORT FIREBASE V9 MODULAR
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, signInWithCustomToken, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 2. KONFIGURASI FIREBASE
        // PENTING: Ganti nilai di bawah ini dengan config dari Firebase Console Anda!
        let firebaseConfig = {
            apiKey: "ISI_API_KEY_ANDA",
            authDomain: "ISI_PROJECT_ID.firebaseapp.com",
            projectId: "ISI_PROJECT_ID",
            storageBucket: "ISI_PROJECT_ID.appspot.com",
            messagingSenderId: "ISI_SENDER_ID",
            appId: "ISI_APP_ID"
        };

        // Fallback untuk environment preview (biarkan saja agar tetap bisa di-preview di sini)
        if (typeof __firebase_config !== 'undefined') {
            firebaseConfig = JSON.parse(__firebase_config);
        }

        // Inisialisasi Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Path generator untuk Firestore (menjaga kompatibilitas antara preview AI dan server production)
        const isPreviewEnv = typeof __app_id !== 'undefined';
        const appId = isPreviewEnv ? __app_id : 'tradisi-app';
        
        const getUserDocPath = (uid) => {
            return isPreviewEnv ? `artifacts/${appId}/users/${uid}/profile/data` : `users/${uid}`;
        };

        // 3. STRUKTUR MENU & NAVIGASI (Wajib Title Case)
        const menuStructure = [
            {
                category: "Menu Utama",
                icon: "ph-house",
                items: ["Dashboard", "Pengaturan Madrasah", "Panduan Kurikulum", "Profil Saya"]
            },
            {
                category: "Data Master",
                icon: "ph-database",
                items: ["Data Siswa", "Jadwal Pelajaran", "Kalender Pendidikan"]
            },
            {
                category: "Administrasi KBM",
                icon: "ph-chalkboard-teacher",
                items: ["Absensi Siswa", "Jurnal Agenda Guru", "Penilaian Siswa"]
            },
            {
                category: "Kesiswaan",
                icon: "ph-users-three",
                items: ["Kokurikuler", "Manajemen Ekskul", "Portofolio Prestasi"]
            },
            {
                category: "Perangkat Ajar",
                icon: "ph-folder-open",
                items: ["Cover Administrasi", "Program Tahunan", "Program Semester", "Alur Tujuan Pembelajaran", "Modul Ajar", "Bahan Ajar", "Lembar Kerja Peserta Didik"]
            },
            {
                category: "Asesmen",
                icon: "ph-exam",
                items: ["Program Asesmen", "Kriteria Ketercapaian Tujuan Pembelajaran", "Bank Soal", "Kisi-Kisi Soal", "Analisis Butir Soal"]
            }
        ];

        // 4. VARIABEL GLOBAL
        let currentUser = null;
        let userProfile = { nama: "Guru Pendidik", nip: "-", mapel: "-" };

        // 5. INISIALISASI UI
        const loginView = document.getElementById('login-view');
        const appView = document.getElementById('app-view');
        const sidebarMenuContainer = document.getElementById('sidebar-menu-container');
        const contentArea = document.getElementById('content-area');
        const headerTitle = document.getElementById('header-title');
        
        // Render Sidebar Dinamis
        function renderSidebar() {
            let html = '';
            menuStructure.forEach(group => {
                html += `
                <div class="mb-2">
                    <h3 class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2 flex items-center gap-2">
                        <i class="ph ${group.icon}"></i> ${group.category}
                    </h3>
                    <ul class="space-y-1 border-l border-gray-700 ml-2 pl-2">
                `;
                group.items.forEach(item => {
                    html += `
                        <li>
                            <button onclick="window.loadPage('${item}')" class="w-full text-left text-sm text-gray-300 hover:text-white hover:bg-gray-800 py-2 px-3 rounded transition-colors menu-item" data-page="${item}">
                                ${item}
                            </button>
                        </li>
                    `;
                });
                html += `</ul></div>`;
            });
            sidebarMenuContainer.innerHTML = html;
        }

        // SPA Navigation Logic
        window.loadPage = function(pageTitle) {
            headerTitle.innerText = pageTitle;
            
            // Highlight active menu
            document.querySelectorAll('.menu-item').forEach(el => {
                el.classList.remove('bg-gray-800', 'text-white', 'font-semibold');
                if(el.getAttribute('data-page') === pageTitle) {
                    el.classList.add('bg-gray-800', 'text-white', 'font-semibold');
                }
            });

            // Tutup sidebar di mobile setelah klik menu
            if(window.innerWidth < 768) toggleSidebar(false);

            // Render Konten
            let pageContent = '';
            
            if (pageTitle === 'Dashboard') {
                pageContent = `
                    <div class="fade-in space-y-6">
                        <div class="bg-blue-600 text-white p-6 rounded-xl shadow-md">
                            <h2 class="text-2xl font-bold mb-1">Selamat Datang, ${userProfile.nama}!</h2>
                            <p class="text-blue-100">Sistem Transformasi Digital Administrasi Idrisiyyah.</p>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                                <div class="text-gray-500 text-sm font-medium mb-1">Total Siswa Binaan</div>
                                <div class="text-3xl font-bold text-gray-800">124</div>
                            </div>
                            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                                <div class="text-gray-500 text-sm font-medium mb-1">Jadwal Hari Ini</div>
                                <div class="text-3xl font-bold text-gray-800">4 <span class="text-sm font-normal">Kelas</span></div>
                            </div>
                            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                                <div class="text-gray-500 text-sm font-medium mb-1">Tugas Belum Dinilai</div>
                                <div class="text-3xl font-bold text-red-600">12</div>
                            </div>
                        </div>
                    </div>
                `;
            } else if (pageTitle === 'Profil Saya') {
                pageContent = `
                    <div class="fade-in bg-white p-6 md:p-8 rounded-xl shadow-sm border border-gray-100 max-w-2xl">
                        <h3 class="text-lg font-bold border-b pb-3 mb-5 flex items-center gap-2">
                            <i class="ph ph-user-circle"></i> Pemutakhiran Data Guru
                        </h3>
                        <form id="profile-form" class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Nama Lengkap & Gelar</label>
                                <input type="text" id="prof-nama" value="${userProfile.nama}" class="w-full px-4 py-2 border rounded-lg outline-none focus:border-blue-500 bg-gray-50">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">NIP / NUPTK</label>
                                <input type="text" id="prof-nip" value="${userProfile.nip}" class="w-full px-4 py-2 border rounded-lg outline-none focus:border-blue-500 bg-gray-50">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Mata Pelajaran Diampu</label>
                                <input type="text" id="prof-mapel" value="${userProfile.mapel}" class="w-full px-4 py-2 border rounded-lg outline-none focus:border-blue-500 bg-gray-50">
                            </div>
                            <button type="button" onclick="saveProfile()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-lg transition-colors mt-4">
                                Simpan Perubahan
                            </button>
                            <p id="prof-msg" class="text-sm text-green-600 hidden mt-2">Profil berhasil disimpan ke Firestore!</p>
                        </form>
                    </div>
                `;
            } else {
                pageContent = `
                    <div class="fade-in bg-white p-8 rounded-xl shadow-sm border border-gray-100 text-center py-16">
                        <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-blue-100 text-blue-600 mb-4">
                            <i class="ph ph-folder-dashed text-3xl"></i>
                        </div>
                        <h3 class="text-xl font-bold text-gray-800 mb-2">Modul ${pageTitle}</h3>
                        <p class="text-gray-500 max-w-md mx-auto">Halaman administrasi untuk ${pageTitle} sedang dalam tahap pengembangan. Fitur input data akan terhubung dengan Firestore.</p>
                        <button class="mt-6 bg-gray-900 hover:bg-gray-800 text-white px-6 py-2 rounded-lg text-sm transition-colors print:hidden">
                            Tambah Data Baru
                        </button>
                    </div>
                `;
            }
            contentArea.innerHTML = pageContent;
        }

        // Fungsi Simpan Profil ke Firestore
        window.saveProfile = async function() {
            if(!currentUser) return;
            const btn = document.querySelector('button[onclick="saveProfile()"]');
            btn.innerText = "Menyimpan...";
            
            const newNama = document.getElementById('prof-nama').value;
            const newNip = document.getElementById('prof-nip').value;
            const newMapel = document.getElementById('prof-mapel').value;

            try {
                const docRef = doc(db, getUserDocPath(currentUser.uid));
                await setDoc(docRef, {
                    nama: newNama,
                    nip: newNip,
                    mapel: newMapel,
                    updatedAt: new Date()
                }, { merge: true });

                userProfile = { nama: newNama, nip: newNip, mapel: newMapel };
                updateUIProfileInfo();
                
                document.getElementById('prof-msg').classList.remove('hidden');
                setTimeout(() => document.getElementById('prof-msg').classList.add('hidden'), 3000);
            } catch (error) {
                console.error("Gagal menyimpan:", error);
                alert("Gagal menyimpan. Pastikan Aturan (Rules) Firestore telah diatur ke mode terautentikasi.");
            } finally {
                btn.innerText = "Simpan Perubahan";
            }
        }

        function updateUIProfileInfo() {
            document.getElementById('sidebar-user-name').innerText = userProfile.nama;
            document.getElementById('topbar-user-name').innerText = userProfile.nama;
            document.getElementById('user-initial').innerText = userProfile.nama.charAt(0).toUpperCase();
            
            if(headerTitle.innerText === 'Dashboard') {
                window.loadPage('Dashboard');
            }
        }

        // 6. LOGIC AUTENTIKASI
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const btn = document.getElementById('login-btn');
            const errDiv = document.getElementById('login-error');
            
            btn.innerHTML = `<i class="ph ph-spinner animate-spin text-xl"></i>`;
            btn.disabled = true;
            errDiv.classList.add('hidden');

            try {
                if (isPreviewEnv && typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else if (isPreviewEnv && firebaseConfig.apiKey === "ISI_API_KEY_ANDA") {
                    await signInAnonymously(auth);
                } else {
                    await signInWithEmailAndPassword(auth, email, pass);
                }
            } catch (error) {
                errDiv.innerText = error.message.includes('auth/') ? "Email atau Password salah." : error.message;
                errDiv.classList.remove('hidden');
                btn.innerHTML = `<span>Masuk</span>`;
                btn.disabled = false;
            }
        });

        document.getElementById('logout-btn').addEventListener('click', async () => {
            await signOut(auth);
        });

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                try {
                    const docRef = doc(db, getUserDocPath(user.uid));
                    const docSnap = await getDoc(docRef);
                    if (docSnap.exists()) {
                        userProfile = { ...userProfile, ...docSnap.data() };
                    } else {
                        const defaultName = user.email ? user.email.split('@')[0] : "Guru Pendidik";
                        await setDoc(docRef, { nama: defaultName, nip: "-", mapel: "-" });
                        userProfile.nama = defaultName;
                    }
                } catch(e) {
                    console.log("Firestore error/belum dikonfigurasi: ", e.message);
                }
                
                updateUIProfileInfo();
                loginView.classList.add('hidden');
                appView.classList.remove('hidden');
                
                renderSidebar();
                window.loadPage('Dashboard');
            } else {
                currentUser = null;
                loginView.classList.remove('hidden');
                appView.classList.add('hidden');
                document.getElementById('login-btn').innerHTML = `<span>Masuk</span>`;
                document.getElementById('login-btn').disabled = false;
            }
        });

        // 7. INTERAKSI MOBILE SIDEBAR
        const sidebar = document.getElementById('sidebar');
        const mobileOverlay = document.getElementById('mobile-overlay');
        
        function toggleSidebar(show) {
            if(show) {
                sidebar.classList.remove('-translate-x-full');
                mobileOverlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                mobileOverlay.classList.add('hidden');
            }
        }

        document.getElementById('open-sidebar').addEventListener('click', () => toggleSidebar(true));
        document.getElementById('close-sidebar').addEventListener('click', () => toggleSidebar(false));
        mobileOverlay.addEventListener('click', () => toggleSidebar(false));

        renderSidebar();

    </script>
</body>
</html>
